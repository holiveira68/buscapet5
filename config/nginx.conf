# ════════════════════════════════════════════════════════
# nginx.conf — Buscapet.com
# Configuração de produção para Nginx
#
# Como usar:
#   sudo cp nginx.conf /etc/nginx/sites-available/buscapet
#   sudo ln -s /etc/nginx/sites-available/buscapet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ════════════════════════════════════════════════════════

# Frontend — www.buscapet.com / buscapet.com
server {
    listen 80;
    server_name buscapet.com www.buscapet.com;

    # Redirecionar para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name buscapet.com www.buscapet.com;

    # Certificado SSL — Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/buscapet.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buscapet.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Pasta dos arquivos estáticos do frontend
    root /var/www/buscapet/frontend;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # Cache para assets estáticos
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: todas as rotas apontam para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# API — api.buscapet.com → localhost:3001
server {
    listen 80;
    server_name api.buscapet.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.buscapet.com;

    ssl_certificate     /etc/letsencrypt/live/api.buscapet.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buscapet.com/privkey.pem;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout para operações longas (matching full)
        proxy_read_timeout 60s;
    }
}
